name: Release

on:
  release:
    types: [created]

jobs:
  build-platforms:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux, win, mac, pi]
        include:
          - platform: linux
            artifact: harbourmesh-linux-x64
          - platform: win
            artifact: harbourmesh-win-x64
          - platform: mac
            artifact: harbourmesh-macos-universal
          - platform: pi
            artifact: harbourmesh-pi-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Build ${{ matrix.platform }}
        working-directory: ./app
        run: npm run build:${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: app/dist/*

  create-dzip-release:
    runs-on: ubuntu-latest
    needs: build-platforms
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Build universal DZIP
        working-directory: ./app
        run: npm run build:dzip

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release bundle
        run: |
          mkdir -p release-bundle
          cp dist/*/*.dzip release-bundle/ 2>/dev/null || true
          cp dist/*.dzip release-bundle/ 2>/dev/null || true
          cd release-bundle && ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-bundle/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
